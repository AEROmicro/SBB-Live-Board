<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="theme-color" content="#2d327d">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="image.png">
    <title>SBB Live Board</title>
    <link rel="icon" type="image/png" href="image.png">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="board">
        <div class="header">
            <div style="display:flex; align-items:center;">
                <div class="sbb-logo-text">SBB CFF FFS</div>
                <div class="station-container">
                    <div class="station-name" id="displayStation">Zürich HB</div>
                    <div class="temp-header" id="tempDisplay">--°C</div>
                </div>
            </div>
            <div class="clock-face">
                <div id="markers"></div>
                <div class="hand hour-hand" id="hourHand"></div>
                <div class="hand minute-hand" id="minHand"></div>
                <div class="hand second-hand" id="secHand"></div>
            </div>
        </div>

        <div id="map"></div> 
        <table>
            <thead>
                <tr>
                    <th style="width: 15%;">Abfahrt</th>
                    <th style="width: 70%;">Linie / Ziel</th>
                    <th style="width: 15%; text-align: right;">Gleis</th>
                </tr>
            </thead>
            <tbody id="boardBody"></tbody>
        </table>
        <div class="last-updated" id="updateTime">Verbindung wird hergestellt...</div>
    </div>

    <div class="search-container">
        <div id="autocomplete-list"></div>
        <div class="search-box">
            <input type="text" id="stationInput" placeholder="Bahnhof suchen..." autocomplete="off">
            <button class="util-btn" onclick="toggleFavorite()">Save</button>
            <button class="util-btn" onclick="openSettings()">Menu</button>
            <button class="update-btn" onclick="fetchBoard()">Update</button>
        </div>

        <div class="copyright">
            <a href="https://sites.google.com/view/aeroforge/" target="_blank" rel="noopener noreferrer">© ÆROforge 2026</a><br>
            <br>Version 3 Basel<br>
            All station data and SBB branding used under official terms.<br>
            Licensed under GNU GPLv3.
        </div>
    </div>

    <div id="settingsOverlay">
        <div class="settings-content">
            <div class="modal-header">
                <h2>Settings</h2>
                <span class="close-btn" onclick="closeSettings()">&times;</span>
            </div>
            
            <div class="setting-row">
                <label>Temperature Unit:</label>
                <div style="display:flex; gap:10px;">
                    <button class="util-btn" style="flex:1" onclick="setTempUnit('C')">Celsius</button>
                    <button class="util-btn" style="flex:1" onclick="setTempUnit('F')">Fahrenheit</button>
                </div>
            </div>

            <div class="setting-row">
                <label>Time Format:</label>
                <div style="display:flex; gap:10px;">
                    <button class="util-btn" style="flex:1" onclick="setTimeFormat(false)">24h</button>
                    <button class="util-btn" style="flex:1" onclick="setTimeFormat(true)">12h</button>
                </div>
            </div>

            <div class="setting-row">
                <label>Max Entries:</label>
                <div style="display:flex; align-items:center; gap:10px;">
                    <input type="number" id="entryInput" style="flex:1; padding: 10px;" value="15" onchange="updateEntryCount(this.value)">
                </div>
            </div>

            <div class="setting-row">
                <label>Time Zone:</label>
                <div style="display:flex; gap:10px;">
                    <button class="util-btn" style="flex:1" onclick="setTimeZone('local')">Local</button>
                    <button class="util-btn" style="flex:1" onclick="setTimeZone('Europe/Zurich')">Swiss</button>
                </div>
            </div>

            <div class="setting-row">
                <label>Alerts (Favorites):</label>
                <div style="display:flex; gap:10px;">
                    <button class="util-btn" id="notifBtnOn" style="flex:1" onclick="setNotifications(true)">On</button>
                    <button class="util-btn" id="notifBtnOff" style="flex:1" onclick="setNotifications(false)">Off</button>
                </div>
            </div>

            <div class="setting-row">
                <label>Favorites:</label>
                <div class="fav-list" id="favListContainer"></div>
            </div>
            
        </div>
    </div>

    <div id="trainDetailsModal" class="overlay-modal" onclick="if(event.target == this) this.style.display='none'">
        <div class="modal-content-details">
          <div class="modal-header">
              <h2 id="modalTrainName"></h2>
              <div class="close-btn" onclick="document.getElementById('trainDetailsModal').style.display='none'">&times;</div>
          </div>
            <div id="modalTrainStatus" class="modal-status"></div>
            <div id="modalRouteList" class="route-list-wrapper"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
