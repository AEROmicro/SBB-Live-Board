<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2d327d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/d/d2/SBB_logo.svg">
    <title>SBB Live Board</title>
    <link rel="icon" type="image/png" href="image.png">
    <style>
        :root {
            --sbb-blue: #2d327d;
            --sbb-red: #eb0000;
            --sbb-white: #ffffff;
            --sbb-dark-grey: #1a1a1a;
            --clock-size: 100px;
            --buffer: 4px; 
        }

        body {
            background-color: var(--sbb-dark-grey);
            color: var(--sbb-white);
            font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .board {
            background-color: var(--sbb-blue);
            width: 100%;
            max-width: 1100px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 25px;
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(0,0,0,0.15);
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }

        .sbb-logo-text { background: var(--sbb-red); padding: 5px 12px; font-weight: 900; font-size: 1rem; margin-right: 15px; }
        .station-name { font-size: 2rem; font-weight: bold; }

        .clock-face {
            width: var(--clock-size);
            height: var(--clock-size);
            background-color: var(--sbb-white);
            border-radius: 50%;
            position: relative;
            flex-shrink: 0;
        }
        
        #markers { position: absolute; width: 100%; height: 100%; }
        .marker {
            position: absolute;
            left: 50%;
            background: black;
            transform-origin: 50% calc(50px - var(--buffer)); 
        }
        .marker.hour { width: 4px; height: 12px; margin-left: -2px; top: var(--buffer); }
        .marker.min { width: 1.5px; height: 4px; margin-left: -0.75px; top: var(--buffer); }

        .hand { position: absolute; left: 50%; top: 50%; background: black; }
        .hour-hand { width: 6px; height: 32px; margin-left: -3px; transform: translateY(-25px); transform-origin: 50% 25px; z-index: 2; }
        .minute-hand { width: 6px; height: 42px; margin-left: -3px; transform: translateY(-37px); transform-origin: 50% 37px; z-index: 3; }
        .second-hand { 
            width: 1.5px; height: 38px; margin-left: -0.75px; 
            background: var(--sbb-red); 
            transform: translateY(-28px); transform-origin: 50% 28px; z-index: 4; 
        }
        .second-hand::after {
            content: ''; position: absolute; top: 0; left: 50%; width: 10px; height: 10px;
            background: var(--sbb-red); border-radius: 50%; transform: translate(-50%, -5px);
        }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { text-align: left; padding: 12px 30px; font-size: 0.8rem; color: rgba(255,255,255,0.4); text-transform: uppercase; }
        td { padding: 15px 30px; border-bottom: 1px solid rgba(255,255,255,0.05); white-space: nowrap; overflow: hidden; vertical-align: middle; }
        
        .time-cell { font-size: 1.6rem; font-weight: bold; width: 120px; }
        .line-badge { display: inline-block; padding: 2px 6px; font-weight: 900; font-size: 1rem; margin-right: 12px; border-radius: 2px; min-width: 40px; text-align: center; }
        .line-IR { background: var(--sbb-red); color: white; }
        .line-IC { background: white; color: var(--sbb-red); border: 2px solid var(--sbb-red); }
        .line-S { background: white; color: var(--sbb-blue); border: 1.5px solid var(--sbb-blue); }
        
        .dest-cell { font-size: 1.6rem; font-weight: bold; }
        .via-text { font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-top: 2px; }
        .track-box { background: white; color: var(--sbb-blue); padding: 4px 12px; font-weight: 900; font-size: 1.4rem; border-radius: 2px; }
        .delay { color: #ff5555; margin-left: 8px; font-size: 1rem; }

        /* Last Updated Info */
        .last-updated {
            padding: 10px 30px;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.4);
            text-align: right;
            background: rgba(0,0,0,0.1);
        }

        /* Search UI */
        .search-container {
            position: relative;
            margin-top: auto; 
            width: 100%;
            max-width: 600px;
            padding-bottom: 20px;
        }
        .search-box { display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 12px; font-size: 1rem; border: none; border-radius: 2px; }
        
        #autocomplete-list { 
            position: absolute; bottom: 100%; left: 0; right: 0; 
            background: white; color: black; z-index: 1000; 
            margin-bottom: 5px; border-radius: 2px;
        }
        .autocomplete-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; }
        .autocomplete-item:hover { background-color: #f0f0f0; }
        button { padding: 10px 20px; background: var(--sbb-red); color: white; border: none; font-weight: bold; cursor: pointer; }

        /* Footer Copyright */
        .footer-copyright {
            text-align: center;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.3);
            margin-top: 20px;
            line-height: 1.6;
            letter-spacing: 0.02em;
        }
    </style>
</head>
<body>

    <div class="board">
        <div class="header">
            <div style="display:flex; align-items:center;">
                <div class="sbb-logo-text">SBB CFF FFS</div>
                <div class="station-name" id="displayStation">Zürich HB</div>
            </div>
            
            <div class="clock-face">
                <div id="markers"></div>
                <div class="hand hour-hand" id="hourHand"></div>
                <div class="hand minute-hand" id="minHand"></div>
                <div class="hand second-hand" id="secHand"></div>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th style="width: 15%;">Zeit</th>
                    <th style="width: 70%;">Linie / Ziel</th>
                    <th style="width: 15%; text-align: right;">Gleis</th>
                </tr>
            </thead>
            <tbody id="boardBody"></tbody>
        </table>
        <div class="last-updated" id="updateTime">Wird geladen...</div>
    </div>

    <div class="search-container">
        <div id="autocomplete-list"></div>
        <div class="search-box">
            <input type="text" id="stationInput" placeholder="Suchen..." autocomplete="off">
            <button onclick="fetchBoard()">Update</button>
        </div>
        <div class="footer-copyright">
            © ÆROforge 2026<br>
            All station data and SBB CFF FFS branding are used under official SBB CFF FFS copyright and trademark terms.<br>
            Licended under the GNU GPLv3 license. This software is open source and provides zero warranty.
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
        // 1. CLOCK LOGIC
        const markersContainer = document.getElementById('markers');
        for (let i = 0; i < 60; i++) {
            const marker = document.createElement('div');
            marker.className = (i % 5 === 0) ? 'marker hour' : 'marker min';
            marker.style.transform = `rotate(${i * 6}deg)`;
            markersContainer.appendChild(marker);
        }

        function runClock() {
            const now = new Date();
            const ms = now.getMilliseconds();
            const sec = now.getSeconds();
            const min = now.getMinutes();
            const hr = now.getHours();

            const totalMs = (sec * 1000) + ms;
            let secDeg = totalMs < 58500 ? (totalMs / 58500) * 360 : 0;
            const minDeg = min * 6;
            const hrDeg = (hr % 12 * 30) + (min * 0.5);

            document.getElementById('secHand').style.transform = `translateY(-28px) rotate(${secDeg}deg)`;
            document.getElementById('minHand').style.transform = `translateY(-37px) rotate(${minDeg}deg)`;
            document.getElementById('hourHand').style.transform = `translateY(-25px) rotate(${hrDeg}deg)`;
            requestAnimationFrame(runClock);
        }
        runClock();

        // 2. AUTOCOMPLETE & REFRESH LOGIC
        const input = document.getElementById('stationInput');
        const list = document.getElementById('autocomplete-list');
        const updateDisplay = document.getElementById('updateTime');

        input.addEventListener('input', async () => {
            const val = input.value;
            if (val.length < 2) { list.innerHTML = ''; return; }
            const res = await fetch(`https://transport.opendata.ch/v1/locations?query=${val}`);
            const data = await res.json();
            list.innerHTML = data.stations.slice(0, 5).map(s => 
                `<div class="autocomplete-item" onclick="selectStation('${s.name}')">${s.name}</div>`
            ).join('');
        });

        function selectStation(name) {
            input.value = name;
            list.innerHTML = '';
            fetchBoard();
        }

        async function fetchBoard() {
            const savedStation = localStorage.getItem('lastStation');
            const station = input.value || savedStation || 'Zürich HB';
            
            try {
                const res = await fetch(`https://transport.opendata.ch/v1/stationboard?station=${station}&limit=12`);
                const data = await res.json();
                
                document.getElementById('displayStation').innerText = data.station.name;
                localStorage.setItem('lastStation', data.station.name);

                const tbody = document.getElementById('boardBody');
                let newRows = '';

                data.stationboard.forEach(train => {
                    const dep = new Date(train.stop.departure);
                    const time = dep.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    const delay = train.stop.delay ? `<span class="delay">+${train.stop.delay}′</span>` : '';
                    let lineClass = train.category === 'IR' ? 'line-IR' : (train.category === 'IC' ? 'line-IC' : 'line-S');
                    const via = train.passList.slice(1, 4).map(p => p.station.name).join(' - ');

                    newRows += `
                        <tr>
                            <td class="time-cell">${time}${delay}</td>
                            <td class="dest-cell">
                                <span class="line-badge ${lineClass}">${train.category}${train.number || ''}</span>
                                ${train.to}
                                <div class="via-text">via ${via}</div>
                            </td>
                            <td style="text-align: right;"><span class="track-box">${train.stop.platform || ''}</span></td>
                        </tr>`;
                });
                tbody.innerHTML = newRows;
                
                // Update the "Last Updated" timestamp
                const now = new Date();
                updateDisplay.innerText = `Zuletzt aktualisiert: ${now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'})}`;
                
            } catch (e) { 
                console.error("Refresh failed:", e);
                updateDisplay.innerText = "Verbindungsfehler - Versuche es erneut...";
            }
        }

        // Auto-refresh every 10 seconds
        setInterval(fetchBoard, 10000);

        // Initial fetch
        fetchBoard();
    </script>
</body>
</html>
